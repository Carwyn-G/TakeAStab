<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take A Stab Craft Box</title>
    <link rel="stylesheet" href="main.css"/>
    <link rel="stylesheet" href="https://use.typekit.net/pgo5lxd.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a id="logo" href="index.html"><img src="images/logo.svg" alt="Take A Stab logo, a crossed pair of swords shaped as a sewing pin and needle"></a></li>
                <li>
                    <div>
                        <ul id="main-menu">
                            <li><a href="subscriptions.html">Subscriptions</a></li>
                            <li><a href="kits.html">Kits</a></li>
                            <li><a href="community.html">Community</a></li>
                        </ul>
                    </div></li>
                <li><div>
                        <ul id="account-nav">
                            <li><a href="cart.html" id="cart-icon"><img src="images/cart.svg" alt="shopping cart icon"></a></li>
                            <li><a href="login.html">Log in</a></li>
                            <li><a href="signup.html">Join</a></li>
                        </ul>
                    </div></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="contact">
            <h1>Contact Us</h1>
            <p>
            If you have any questions or concerns about your order, don't hesitate to reach out!
            </p>
            <form>
            <div id="short-input">
                <label for="name">Name (required):</label>
                <input
                type="text"
                name="name"
                id="name"
                placeholder="Enter your name"
                required
                />
                <label for="email">Email (required):</label>
                <input
                type="text"
                name="email"
                id="email"
                placeholder="Enter your email"
                required
                />
                <label for="photographer"
                >Subject:</label
                >
                <input
                type="text"
                name="subject"
                id="subject"
                placeholder="Enter a subject for your message"
                />
            </div>
            <div id="long-input">
                <div>
                <label for="message">Message (required):</label>
                <textarea
                name="message"
                id="message"
                placeholder="Enter your message"
                required
                ></textarea></div>
                <button type="submit">Send</button>
            </div>
            </form>
        </div>
    </main>
    <footer>
        <div>
            <h4>Company</h4>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="faq.html">FAQ</a>
        </div>
        <div>
            <h4>Customers</h4>
            <a href="dashboard">Account Dashboard</a>
            <a href="#">Workshop Gallery</a>
            <a href="#">Gift Cards</a>
        </div>
        <div>
            <h4>Connect</h4>
            <a href="#">Instagram</a>
            <a href="#">Pinterest</a>
            <a href="#">Reddit</a>
            <a href="#">Bluesky</a>
        </div>
    </footer>      
</body>
</html>
